<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Question Bank — Exam System</title>
  <link rel="stylesheet" href="../../assets/css/exam.css">
</head>
<body>

  <!-- SIDEBAR -->
  <div class="sidebar">
    <div class="sidebar-brand">
      <div class="brand-icon">E</div>
      <h2>ExamSystem</h2>
    </div>

    <div class="sidebar-section">Test</div>
    <a href="create-exam.html">
      <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"/></svg>
      Create Exam
    </a>
    <a href="edit-exam.html">
      <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M11 5H6a2 2 0 00-2 2v11a2 2 0 002 2h11a2 2 0 002-2v-5m-1.414-9.414a2 2 0 112.828 2.828L11.828 15H9v-2.828l8.586-8.586z"/></svg>
      Edit Exam
    </a>

    <div class="sidebar-section">Organize</div>
    <a href="question-bank.html" class="active">
      <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2"/></svg>
      Question Bank
    </a>
  </div>

  <!-- TOPBAR -->
  <div class="topbar">
    <div class="topbar-title">Question Bank</div>
    <div class="topbar-right">
      <div class="topbar-badge">
        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 17h5l-1.405-1.405A2.032 2.032 0 0118 14.158V11a6.002 6.002 0 00-4-5.659V5a2 2 0 10-4 0v.341C7.67 6.165 6 8.388 6 11v3.159c0 .538-.214 1.055-.595 1.436L4 17h5m6 0v1a3 3 0 11-6 0v-1m6 0H9"/></svg>
        <span class="notif-dot"></span>
      </div>
      <div class="avatar">A</div>
    </div>
  </div>

  <!-- MAIN -->
  <div class="main">
    <div class="card">
      <div class="card-header">
        <div class="card-title">Create Question</div>
      </div>
      <div id="questionAlert" class="alert"></div>
      <form id="questionForm">
        <div class="form-grid">
          <div class="form-group">
            <label for="questionType">Type</label>
            <select id="questionType" name="questionType">
              <option value="MCQ">MCQ</option>
              <option value="SHORT">Short Answer</option>
            </select>
          </div>
          <div class="form-group">
            <label for="questionExamId">Attach to Exam (optional)</label>
            <select id="questionExamId" name="questionExamId">
              <option value="">—</option>
            </select>
          </div>
          <div class="form-group">
            <label for="questionCode">Question Code</label>
            <input type="text" id="questionCode" name="questionCode" placeholder="Q001">
          </div>
          <div class="form-group">
            <label for="questionSubjectCode">Subject Code</label>
            <input type="text" id="questionSubjectCode" name="questionSubjectCode" placeholder="CS301">
          </div>
          <div class="form-group">
            <label for="questionMarks">Marks</label>
            <input type="number" id="questionMarks" name="questionMarks" value="1" min="1">
          </div>
          <div class="form-group full">
            <label for="questionText">Question Text</label>
            <textarea id="questionText" name="questionText" placeholder="Type the question..."></textarea>
          </div>
          <div id="mcqFields" class="form-group full">
            <div class="question-grid">
              <div class="form-group">
                <label for="option1">Option 1</label>
                <input type="text" id="option1">
              </div>
              <div class="form-group">
                <label for="option2">Option 2</label>
                <input type="text" id="option2">
              </div>
              <div class="form-group">
                <label for="option3">Option 3</label>
                <input type="text" id="option3">
              </div>
              <div class="form-group">
                <label for="option4">Option 4</label>
                <input type="text" id="option4">
              </div>
              <div class="form-group">
                <label for="correctIndex">Correct Option</label>
                <select id="correctIndex">
                  <option value="0">1</option>
                  <option value="1">2</option>
                  <option value="2">3</option>
                  <option value="3">4</option>
                </select>
              </div>
            </div>
          </div>
          <div id="shortFields" class="form-group full" style="display:none">
            <label for="expectedAnswer">Expected Answer</label>
            <textarea id="expectedAnswer" placeholder="Model answer..."></textarea>
          </div>
        </div>
        <div class="form-actions">
          <button type="submit" class="btn btn-primary">Add Question</button>
        </div>
      </form>
    </div>

    <div class="card">
      <div class="card-header">
        <div class="card-title">Question Bank</div>
      </div>
      <div class="search-bar">
        <div class="form-group" style="min-width: 220px;">
          <label for="subjectFilter">Filter by Subject</label>
          <input type="text" id="subjectFilter" placeholder="CS301">
        </div>
        <button class="btn btn-outline btn-sm" id="applyFilter" type="button">Apply</button>
        <button class="btn btn-outline btn-sm" id="clearFilter" type="button">Clear</button>
      </div>
      <div id="questionCards" class="question-cards"></div>
      <div id="questionEmpty" class="empty-note">No questions found.</div>
      </div>
    </div>

  </div>

  <script src="../../assets/js/exam.js"></script>
</body>
</html>
