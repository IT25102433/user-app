<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Edit Exam — Exam System</title>
  <link rel="stylesheet" href="../../assets/css/exam.css">
</head>
<body>

  <!-- SIDEBAR -->
  <div class="sidebar">
    <div class="sidebar-brand">
      <div class="brand-icon">E</div>
      <h2>ExamSystem</h2>
    </div>

    <div class="sidebar-section">Test</div>
    <a href="create-exam.html">
      <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"/></svg>
      Create Exam
    </a>
    <a href="edit-exam.html" class="active">
      <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M11 5H6a2 2 0 00-2 2v11a2 2 0 002 2h11a2 2 0 002-2v-5m-1.414-9.414a2 2 0 112.828 2.828L11.828 15H9v-2.828l8.586-8.586z"/></svg>
      Edit Exam
    </a>

    <div class="sidebar-section">Organize</div>
    <a href="question-bank.html">
      <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2"/></svg>
      Question Bank
    </a>
  </div>

  <!-- TOPBAR -->
  <div class="topbar">
    <div class="topbar-title">Edit Exam</div>
    <div class="topbar-right">
      <div class="topbar-badge">
        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 17h5l-1.405-1.405A2.032 2.032 0 0118 14.158V11a6.002 6.002 0 00-4-5.659V5a2 2 0 10-4 0v.341C7.67 6.165 6 8.388 6 11v3.159c0 .538-.214 1.055-.595 1.436L4 17h5m6 0v1a3 3 0 11-6 0v-1m6 0H9"/></svg>
        <span class="notif-dot"></span>
      </div>
      <div class="avatar">A</div>
    </div>
  </div>

  <!-- MAIN -->
  <div class="main">

    <!-- Exam list preview -->
    <div class="card" style="margin-bottom:24px">
      <div class="card-header">
        <div class="card-title">Existing Exams</div>
        <a href="create-exam.html" class="btn btn-outline btn-sm">+ New Exam</a>
      </div>
      <div class="table-wrap">
        <table>
          <thead>
            <tr>
              <th>Exam ID</th>
              <th>Subject</th>
              <th>Duration</th>
              <th>Marks</th>
              <th>Status</th>
              <th>Actions</th>
            </tr>
          </thead>
          <tbody id="examTableBody"></tbody>
        </table>
      </div>
    </div>

    <div id="editAlert" class="alert"></div>

    <div id="editExamModal" class="modal-overlay" style="display:none">
      <div class="modal-card">
        <div class="card-header" style="margin-bottom:16px">
          <div class="card-title">Update Exam</div>
          <button type="button" id="closeEditModal" class="btn btn-outline btn-sm">Close</button>
        </div>

        <form id="editExamForm">
          <div class="form-grid">
            <div class="form-group">
              <label for="examId">Exam ID</label>
              <input type="text" id="examId" name="examId" readonly>
            </div>

            <div class="form-group">
              <label for="newDuration">New Duration (minutes) <span style="color:#ef4444">*</span></label>
              <input type="number" id="newDuration" name="newDuration" placeholder="e.g. 90" min="1">
            </div>

            <div class="form-group">
              <label for="newMarks">New Total Marks</label>
              <input type="number" id="newMarks" name="newMarks" placeholder="e.g. 100" min="1">
            </div>

            <div class="form-group">
              <label for="newStatus">Status</label>
              <select id="newStatus" name="newStatus">
                <option value="Pending">Pending</option>
                <option value="Done">Done</option>
                <option value="Cancel">Cancel</option>
              </select>
            </div>
          </div>

          <div class="form-actions">
            <button type="button" id="deleteSelectedExam" class="btn btn-danger btn-sm">Delete Exam</button>
            <button type="submit" class="btn btn-primary">
              <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" style="width:16px;height:16px"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"/></svg>
              Update Exam
            </button>
          </div>
        </form>
      </div>
    </div>

  </div>

  <script src="../../assets/js/exam.js"></script>
</body>
</html>
