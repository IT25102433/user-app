<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Create Exam — Exam System</title>
  <link rel="stylesheet" href="../../assets/css/exam.css">
</head>
<body>

  <!-- SIDEBAR -->
  <div class="sidebar">
    <div class="sidebar-brand">
      <div class="brand-icon">E</div>
      <h2>ExamSystem</h2>
    </div>

    <div class="sidebar-section">Test</div>
    <a href="create-exam.html" class="active">
      <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"/></svg>
      Create Exam
    </a>
    <a href="edit-exam.html">
      <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M11 5H6a2 2 0 00-2 2v11a2 2 0 002 2h11a2 2 0 002-2v-5m-1.414-9.414a2 2 0 112.828 2.828L11.828 15H9v-2.828l8.586-8.586z"/></svg>
      Edit Exam
    </a>

    <div class="sidebar-section">Organize</div>
    <a href="question-bank.html">
      <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2"/></svg>
      Question Bank
    </a>
  </div>

  <!-- TOPBAR -->
  <div class="topbar">
    <div class="topbar-title">Create Exam</div>
    <div class="topbar-right">
      <div class="topbar-badge">
        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 17h5l-1.405-1.405A2.032 2.032 0 0118 14.158V11a6.002 6.002 0 00-4-5.659V5a2 2 0 10-4 0v.341C7.67 6.165 6 8.388 6 11v3.159c0 .538-.214 1.055-.595 1.436L4 17h5m6 0v1a3 3 0 11-6 0v-1m6 0H9"/></svg>
        <span class="notif-dot"></span>
      </div>
      <div class="avatar">A</div>
    </div>
  </div>

  <!-- MAIN -->
  <div class="main">

    <!-- Form Card -->
    <div class="card">
      <div class="card-header">
        <div class="card-title">New Exam Details</div>
        <span class="badge badge-blue">Draft</span>
      </div>

      <div id="createAlert" class="alert"></div>

      <form id="createExamForm">
        <div class="form-grid">
          <div class="form-group">
            <label for="examId">Exam ID <span style="color:#ef4444">*</span></label>
            <input type="text" id="examId" name="examId" placeholder="e.g. EXAM-2024-001">
          </div>

          <div class="form-group">
            <label for="subjectCode">Subject Code <span style="color:#ef4444">*</span></label>
            <input type="text" id="subjectCode" name="subjectCode" placeholder="e.g. CS301">
          </div>

          <div class="form-group">
            <label for="duration">Duration (minutes) <span style="color:#ef4444">*</span></label>
            <input type="number" id="duration" name="duration" placeholder="e.g. 60" min="1">
          </div>

          <div class="form-group">
            <label for="totalMarks">Total Marks</label>
            <input type="number" id="totalMarks" name="totalMarks" placeholder="e.g. 50" min="1">
          </div>

          <div class="form-group">
            <label for="passMark">Pass Mark (%)</label>
            <input type="number" id="passMark" name="passMark" placeholder="e.g. 40" min="0" max="100">
          </div>

          <div class="form-group">
            <label for="examStatus">Status</label>
            <select id="examStatus" name="examStatus">
              <option value="Pending">Pending</option>
              <option value="Done">Done</option>
              <option value="Cancel">Cancel</option>
            </select>
          </div>
        </div>

        <div class="form-actions">
          <button type="reset" class="btn btn-outline">Clear</button>
          <button type="submit" class="btn btn-primary">
            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" style="width:16px;height:16px"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"/></svg>
            Create Exam
          </button>
        </div>
      </form>
    </div>

    <!-- Existing Exams -->
    <div class="card" style="margin-top:24px">
      <div class="card-header">
        <div class="card-title">Existing Exams</div>
        <a href="edit-exam.html" class="btn btn-outline btn-sm">Manage in Edit Exam</a>
      </div>
      <div class="table-wrap">
        <table>
          <thead>
            <tr>
              <th>Exam ID</th>
              <th>Subject</th>
              <th>Duration</th>
              <th>Marks</th>
              <th>Status</th>
              <th>Actions</th>
            </tr>
          </thead>
          <tbody id="examTableBody"></tbody>
        </table>
      </div>
    </div>

  </div>

  <script src="../../assets/js/exam.js"></script>
</body>
</html>
